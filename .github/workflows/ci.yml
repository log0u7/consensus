name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv-dev
          key: pip-${{ hashFiles('requirements-dev.txt') }}
      - run: make check
