[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests", "tui"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI uses callables in defaults (Field)
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = false
warn_redundant_casts = true
exclude = ['^tests/']

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"
pythonpath = ["."]
