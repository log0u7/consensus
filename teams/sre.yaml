sandbox: false

roles:
  planner:
    model: zen/deepseek-r1-0528
    fallback: []
    max_tokens: 8000
    skills: [sre]
    tools: []
    rag_ns: infra-docs
    sandbox: false

  executor:
    model: zen/deepseek-v3-0324
    fallback: []
    max_tokens: 8000
    skills: [sre, coding]
    tools: []          # add MCP tool names here when available (e.g. k8s-mcp)
